<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Character Card</title>
  <link rel="stylesheet" href="style_univers.css">
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <header class="header">
    <h1 id="character-name">Stellaria</h1>
    <div class="heart">✹</div>
  </header>

  <div class="main">

    <!-- LEFT -->
    <aside class="left">
      <img id="character-image" src="Images/Galerie/STELLA.tn.png" alt="character">

      <div class="info">
        <p><strong>Birth</strong><span id="birth"></span></p>
        <p><strong>Pronouns</strong><span id="pronouns"></span></p>
        <p><strong>Species</strong><span id="species"></span></p>
        <p><strong>Magic</strong><span id="magic"></span></p>
        <p><strong>Job</strong><span id="job"></span></p>
      </div>
    </aside>

    <!-- RIGHT -->
    <section class="right">
      
      <!-- ABOUT -->
      <div class="about">
        <div class="tab-content active" id="description">
          <h3>Description</h3>
          <p id="description-text"></p>
        </div>

        <div class="tab-content" id="histoire">
          <h3>Histoire</h3>
          <p id="histoire-text"></p>
        </div>

        <div class="tab-content" id="liens">
          <h3>Liens</h3>
          <p id="liens-text"></p>
        </div>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <span class="tab active" data-tab="description">Description</span>
        <span class="tab" data-tab="histoire">Histoire</span>
        <span class="tab" data-tab="liens">Liens</span>
      </div>

      <!-- GALLERY -->
      <div class="gallery">
        <img src="Images/Moodboards/abb3830173527ed08fdb48ab247fe35a.jpg">
        <img src="Images/Moodboards/ebcf71eafe60eb113bb921b47e42a7ae.jpg">
        <img src="Images/Moodboards/e8fbd6852368bafb92878a142f9f72c2.webp">
        <img src="Images/Moodboards/5b37822b5ca1ca57b4326844a4bbed18.jpg">
      </div>

    </section>

  </div>

  <!-- FOOTER -->
  <footer class="footer">
    “ Who controls the past controls the future, who controls the present controls the past. ”
  </footer>

  <!-- SPOTIFY -->
  <iframe style="border-radius:12px"
    src="https://open.spotify.com/embed/playlist/3Vs82njkbndzICmCnY97p7?utm_source=generator&theme=0"
    width="100%" height="152"
    frameborder="0"
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
    loading="lazy">
  </iframe>

</div>

<!-- SCRIPT -->
<script>
let data = {};
let currentCharacter = "stellaria"; 

// Charger JSON
fetch("univers.json")
  .then(response => {
    console.log("response:", response);
    return response.json();
  })
  .then(json => {
    console.log("json:", json); // 🔥 voir si ça charge
    data = json;
    loadCharacter(currentCharacter);
  })
  .catch(error => {
    console.error("Erreur :", error);
  });

// Injecter données
function loadCharacter(name) {
  const char = data[name];

  document.getElementById("character-name").textContent = char.name;
  document.getElementById("birth").textContent = char.birth;
  document.getElementById("pronouns").textContent = char.pronouns;
  document.getElementById("species").textContent = char.species;
  document.getElementById("magic").textContent = char.magic;
  document.getElementById("job").textContent = char.job;

  updateContent("description");
}

// Tabs
const tabs = document.querySelectorAll(".tab");
const contents = document.querySelectorAll(".tab-content");

tabs.forEach(tab => {
  tab.addEventListener("click", () => {

    tabs.forEach(t => t.classList.remove("active"));
    contents.forEach(c => c.classList.remove("active"));

    tab.classList.add("active");

    const selected = tab.dataset.tab;
    document.getElementById(selected).classList.add("active");

    updateContent(selected);
  });
});

// Update texte
function updateContent(tab) {
  const char = data[currentCharacter];

  document.getElementById("description-text").textContent = char.description;
  document.getElementById("histoire-text").textContent = char.histoire;
  document.getElementById("liens-text").textContent = char.liens;
}
</script>

</body>
</html>
