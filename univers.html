<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Character Card</title>
  <link rel="stylesheet" href="style_univers.css">
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <header class="header">
    <h1>TITLE HERE</h1>
    <div class="heart">❤</div>
  </header>

  <div class="main">

    <!-- LEFT -->
    <aside class="left">
      <img src="Images/Galerie/STELLA.tn.png" alt="character">

      <div class="info">
        <p><strong>NAME</strong> content</p>
        <p><strong>GENDER</strong> content</p>
        <p><strong>AGE</strong> content</p>
        <p><strong>HEIGHT</strong> content</p>
        <p><strong>RACE</strong> content</p>
        <p><strong>ROLE</strong> what they do</p>
        <p><strong>DEMEANOR</strong> content</p>
        <p><strong>SIGN</strong> zodiac</p>
        <p><strong>THEME</strong> Song Name 🎵</p>
      </div>
    </aside>

    <!-- RIGHT -->
    <section class="right">
      
      <div class="about">
        <h3>ABOUT</h3>
        <p>
          Write a small intro here... Lorem ipsum dolor sit amet consectetur adipisicing elit...
        </p>
      </div>

      <img class="side-character" src="img2.png" alt="full body">

      <!-- TABS -->
      <div class="tabs">
        <span>🔖</span>
        <span>⚙</span>
        <span>📌</span>
        <span>📚</span>
        <span>👥</span>
      </div>

      <!-- GALLERY -->
      <div class="gallery">
        <img src="img3.jpg">
        <img src="img4.jpg">
        <img src="img5.jpg">
        <img src="img6.jpg">
      </div>

    </section>

  </div>

  <!-- FOOTER -->
  <footer class="footer">
    “ Write a quote or subtitle here... ”
  </footer>
  <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/3Vs82njkbndzICmCnY97p7?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

</div>

</body>
</html>
