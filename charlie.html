<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ouestcharlie</title>

<link rel="stylesheet" href="style_charlie.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Combo&display=swap" rel="stylesheet">

<script src="https://openseadragon.github.io/openseadragon/openseadragon.min.js"></script>

</head>

<body>

<header>
    <a href="index.html">
        <h1>SEOLIA</h1>
    </a>

    <nav>
        <a href="charlie.html">OU EST CHARLIE ?</a>
        <a href="jeux.html">JEUX</a>
        <a href="#">DESSIN INFINI</a>
        <a href="#">TOUTIM MAGAZINE</a>
    </nav>
</header>

<div class="main">

    <!-- VIEWER -->
    <div id="viewer"></div>

    <!-- SIDEBAR -->
    <div class="sidebar">
    <h2>Retrouve ces éléments :</h2>

    <ul class="checklist"></ul>

    <div class="year-buttons">
        <button data-year="2022">2022</button>
        <button data-year="2024">2024</button>
        <button data-year="2025">2025</button>
    </div>

    <a class="artfight-link" href="https://artfight.net/attack/3902456.wheres-wally-part-1" target="_blank">
    Retrouve tous les personnages sur ArtFight.
    </a>
</div>

</div>

<script>

var viewer = OpenSeadragon({
    id: "viewer",
    prefixUrl: "https://openseadragon.github.io/openseadragon/images/",
    tileSources: "Images/Charlie/2022/2022.dzi",

    showNavigator: false,
    showNavigationControl: false,
    showZoomControl: false,
    showHomeControl: false,
    showFullPageControl: false
});

</script>

<script>
fetch("charlie.json")
    .then(response => response.json())
    .then(data => {
        const checklist = document.querySelector(".checklist");

        data.forEach(item => {
            const li = document.createElement("li");

            li.innerHTML = `
                <label>
                    <input type="checkbox">
                    <span>${item}</span>
                </label>
            `;

            checklist.appendChild(li);
        });
    });
</script>

</body>
</html>
