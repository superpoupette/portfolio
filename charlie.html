<body>

<header>

    <nav>
        <a href="galerie.html">GALERIE</a>

         <a href="toutim.html">TOUTIM MAGAZINE</a>
         <a href="charlie.html">OU EST CHARLIE ?</a>    
    </nav>
</header>

<div class="main">

    <!-- VIEWER -->
    <div id="viewer"></div>

    <!-- SIDEBAR -->
    <div class="sidebar">
    <h2>Retrouve ces éléments :</h2>

    <ul class="checklist"></ul>

    <div class="year-buttons">
        <button data-year="2022">2022</button>
        <button data-year="2024">2024</button>
        <button data-year="2025">2025</button>
    </div>

    <a class="artfight-link" href="https://artfight.net/attack/3902456.wheres-wally-part-1" target="_blank">
    Retrouve tous les personnages sur ArtFight.
    </a>
</div>

</div>

<script>
var viewer = OpenSeadragon({
    id: "viewer",
    prefixUrl: "https://openseadragon.github.io/openseadragon/images/",
    tileSources: "Images/Charlie/2022/2022.dzi"
});

let allItems = {};

// Charger le JSON une seule fois
fetch("charlie.json")
    .then(response => response.json())
    .then(data => {
        allItems = data;

        // charger par défaut 2022
        loadYear("2022");
    });

// fonction pour charger une année
function loadYear(year) {
    const checklist = document.querySelector(".checklist");
    checklist.innerHTML = ""; // reset liste

    // changer image
    viewer.open(`Images/Charlie/${year}/${year}.dzi`);

    // remplir checklist
    allItems[year].forEach(item => {
        const li = document.createElement("li");

        li.innerHTML = `
            <label>
                <input type="checkbox">
                <span>${item}</span>
            </label>
        `;

        checklist.appendChild(li);
    });
}

// gestion boutons
document.querySelectorAll(".year-buttons button").forEach(button => {
    button.addEventListener("click", () => {
        const year = button.dataset.year;
        loadYear(year);
    });
});
</script>

</body>
</html>
